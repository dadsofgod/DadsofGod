<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG | Dads of God</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .logo-yellow { color: #facc15; }
        .logo-yellow-bg { background-color: #facc15; }
        
        .product-image-container {
            background-color: #111827;
            padding: 40px 20px;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image {
            max-height: 320px;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-black text-white">

    <h1 style="text-align:center; color:#facc15; padding:40px;">DOG Website - Test Version</h1>

    <!-- SHOP SECTION - Simple Test -->
    <section id="shop" style="max-width:1200px; margin:0 auto; padding:40px;">
        <h2 style="text-align:center; color:#facc15; font-size:2.5rem;">Gear for the Working Man</h2>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px; margin-top:40px;">
            
            <!-- Classic Tee -->
            <div style="background:#1f2937; border-radius:16px; overflow:hidden;">
                <div class="product-image-container">
                    <img src="classic-tee-1.jpg" alt="DOG Classic Tee" 
                         class="product-image cursor-pointer" onclick="alert('Quick View clicked for Classic Tee')">
                </div>
                <div style="padding:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:baseline;">
                        <h3 style="font-size:1.5rem;">DOG Classic Tee</h3>
                        <span style="color:#facc15; font-size:1.5rem; font-weight:bold;">$29</span>
                    </div>
                    <button onclick="alert('Add to Cart clicked')" 
                            style="margin-top:20px; width:100%; background:#facc15; color:black; padding:16px; border-radius:12px; font-weight:600;">
                        ADD TO CART — $29
                    </button>
                </div>
            </div>

            <!-- Long Sleeve -->
            <div style="background:#1f2937; border-radius:16px; overflow:hidden;">
                <div class="product-image-container">
                    <img src="long-sleeve-1.jpg" alt="DOG Long Sleeve" 
                         class="product-image cursor-pointer" onclick="alert('Quick View clicked for Long Sleeve')">
                </div>
                <div style="padding:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:baseline;">
                        <h3 style="font-size:1.5rem;">DOG Long Sleeve</h3>
                        <span style="color:#facc15; font-size:1.5rem; font-weight:bold;">$39</span>
                    </div>
                    <button onclick="alert('Add to Cart clicked')" 
                            style="margin-top:20px; width:100%; background:#facc15; color:black; padding:16px; border-radius:12px; font-weight:600;">
                        ADD TO CART — $39
                    </button>
                </div>
            </div>

            <!-- Hoodie -->
            <div style="background:#1f2937; border-radius:16px; overflow:hidden;">
                <div class="product-image-container">
                    <img src="hoodie-1.jpg" alt="DOG Hoodie" 
                         class="product-image cursor-pointer" onclick="alert('Quick View clicked for Hoodie')">
                </div>
                <div style="padding:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:baseline;">
                        <h3 style="font-size:1.5rem;">DOG Hoodie</h3>
                        <span style="color:#facc15; font-size:1.5rem; font-weight:bold;">$59</span>
                    </div>
                    <button onclick="alert('Add to Cart clicked')" 
                            style="margin-top:20px; width:100%; background:#facc15; color:black; padding:16px; border-radius:12px; font-weight:600;">
                        ADD TO CART — $59
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        alert("Test version loaded successfully. Click on any product image to test Quick View.");
    </script>
</body>
</html>
