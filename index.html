<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG | Dads of God</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .logo-yellow { color: #facc15; }
        .logo-yellow-bg { background-color: #facc15; }

        /* Pulsing halo */
        #heroLogo {
            transition: transform 0.4s ease;
            animation: pulseHalo 4s infinite ease-in-out;
        }
        #heroLogo:hover {
            transform: scale(1.15);
            animation: none;
        }
        @keyframes pulseHalo {
            0%, 100% { filter: drop-shadow(0 0 25px rgba(250, 204, 21, 0.6)); }
            50% { filter: drop-shadow(0 0 55px rgba(250, 204, 21, 0.95)); }
        }

        .product-image-container {
            background-color: #111827;
            padding: 20px;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image { 
            max-height: 310px; 
            object-fit: contain; 
            cursor: pointer; 
        }

        /* Better mobile modal */
        #quickModal .modal-content {
            max-height: 95vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- NAVBAR (same) -->
    <nav class="bg-black border-b border-[#facc15]/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3 group">
                <img src="logo.png" alt="DOG Logo" class="h-12 w-auto transition-all duration-300 group-hover:scale-110">
                <span class="text-3xl logo-font tracking-tight logo-yellow">DOG</span>
            </div>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="#mission" class="hover:logo-yellow transition">Mission</a>
                <a href="#shop" class="hover:logo-yellow transition">Shop</a>
                <a href="#donate" class="hover:logo-yellow transition">Donate</a>
                <a href="#impact" class="hover:logo-yellow transition">Impact</a>
            </div>
            <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-2xl border border-[#facc15]/30">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count" class="font-semibold">Cart $0</span>
            </button>
        </div>
    </nav>

    <!-- HERO, MISSION, SHOP, DONATE, IMPACT sections stay the same as your current working version -->

    <!-- HORIZONTAL + MOBILE-FRIENDLY MODAL -->
    <div id="quickModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4">
        <div class="modal-content bg-zinc-900 rounded-3xl max-w-5xl w-full max-h-[95vh] overflow-hidden">
            <div class="flex flex-col lg:flex-row h-full">
                <!-- Image side -->
                <div class="lg:w-1/2 p-6 flex flex-col items-center">
                    <button onclick="closeModal()" class="self-end text-5xl text-gray-400 hover:text-white mb-4">×</button>
                    <div class="bg-zinc-950 rounded-2xl p-6 mb-6 w-full flex-1 flex items-center justify-center">
                        <img id="modalImage" src="" class="max-h-[380px] lg:max-h-[450px] object-contain">
                    </div>
                    <div id="thumbnailContainer" class="flex gap-4"></div>
                </div>

                <!-- Details side -->
                <div class="lg:w-1/2 p-6 flex flex-col">
                    <h3 id="modalTitle" class="text-3xl lg:text-4xl font-semibold mb-2"></h3>
                    <div id="modalPrice" class="text-5xl lg:text-6xl font-bold logo-yellow mb-6"></div>

                    <div class="mb-8">
                        <p class="text-sm text-gray-400 mb-3">SIZE</p>
                        <div class="flex gap-3 flex-wrap">
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3.5 border border-gray-700 rounded-3xl hover:logo-yellow-border text-sm">S</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3.5 border border-gray-700 rounded-3xl hover:logo-yellow-border text-sm">M</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3.5 border border-gray-700 rounded-3xl hover:logo-yellow-border text-sm">L</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3.5 border border-gray-700 rounded-3xl hover:logo-yellow-border text-sm">XL</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3.5 border border-gray-700 rounded-3xl hover:logo-yellow-border text-sm">XXL</button>
                        </div>
                    </div>

                    <div class="mb-10">
                        <p class="text-sm text-gray-400 mb-3">QUANTITY</p>
                        <div class="flex items-center gap-6">
                            <button onclick="changeQty(-1)" class="w-14 h-14 border border-gray-700 rounded-3xl text-4xl hover:border-[#facc15]">-</button>
                            <span id="modalQty" class="text-5xl font-medium w-14 text-center">1</span>
                            <button onclick="changeQty(1)" class="w-14 h-14 border border-gray-700 rounded-3xl text-4xl hover:border-[#facc15]">+</button>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <div class="flex justify-between items-baseline mb-6">
                            <span class="text-gray-400">TOTAL</span>
                            <div id="modalTotalPrice" class="text-5xl font-bold logo-yellow"></div>
                        </div>
                        <button onclick="addCurrentToCart()" class="w-full logo-yellow-bg hover:bg-[#fde047] text-black py-6 rounded-3xl font-semibold text-xl">ADD TO CART</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cartTotal = 0;
        let currentProduct = null;
        let currentQty = 1;
        let currentImageIndex = 0;

        const products = [
            { id: 0, name: "DOG Classic Tee", price: 29, images: ["classic-tee-1.jpg", "classic-tee-2.jpg"] },
            { id: 1, name: "DOG Long Sleeve", price: 39, images: ["long-sleeve-1.jpg", "long-sleeve-2.jpg"] },
            { id: 2, name: "DOG Hoodie", price: 59, images: ["hoodie-1.jpg", "hoodie-2.jpg"] }
        ];

        function quickView(index) {
            currentProduct = products[index];
            currentQty = 1;
            currentImageIndex = 0;
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalPrice').textContent = '$' + currentProduct.price;
            updateModalImage();
            updateModalTotal();
            renderThumbnails();
            document.getElementById('quickModal').classList.remove('hidden');
            document.getElementById('quickModal').classList.add('flex');
        }

        function updateModalImage() {
            document.getElementById('modalImage').src = currentProduct.images[currentImageIndex];
        }

        function renderThumbnails() {
            const container = document.getElementById('thumbnailContainer');
            container.innerHTML = '';
            currentProduct.images.forEach((src, i) => {
                const thumb = document.createElement('img');
                thumb.src = src;
                thumb.className = `w-20 h-20 lg:w-24 lg:h-24 object-contain bg-zinc-950 rounded-xl cursor-pointer border-2 ${i === currentImageIndex ? 'border-[#facc15] scale-110' : 'border-transparent'}`;
                thumb.onclick = () => {
                    currentImageIndex = i;
                    updateModalImage();
                    renderThumbnails();
                };
                container.appendChild(thumb);
            });
        }

        function closeModal() {
            const m = document.getElementById('quickModal');
            m.classList.add('hidden');
            m.classList.remove('flex');
        }

        function selectSize(btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('logo-yellow-border', 'text-[#facc15]'));
            btn.classList.add('logo-yellow-border', 'text-[#facc15]');
        }

        function changeQty(delta) {
            currentQty = Math.max(1, currentQty + delta);
            document.getElementById('modalQty').textContent = currentQty;
            updateModalTotal();
        }

        function updateModalTotal() {
            if (!currentProduct) return;
            const total = currentProduct.price * currentQty;
            document.getElementById('modalTotalPrice').textContent = '$' + total;
        }

        function addCurrentToCart() {
            if (!currentProduct) return;
            const itemTotal = currentProduct.price * currentQty;
            cartTotal += itemTotal;
            document.getElementById('cart-count').textContent = `Cart $${cartTotal}`;
            closeModal();
            alert(`${currentQty} × ${currentProduct.name} ($${itemTotal}) added!`);
        }

        function toggleCart() {
            alert(`Your cart total is currently $${cartTotal}`);
        }

        function activateLogo() {
            alert("Faith Activated! +$10 to the mission");
        }
    </script>
</body>
</html>
