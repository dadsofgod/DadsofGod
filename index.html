<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG | Dads of God</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
        
        .logo-yellow { color: #facc15; }
        .logo-yellow-bg { background-color: #facc15; }
        
        .product-image-container {
            background-color: #111827;
            padding: 20px;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image {
            max-height: 310px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- NAVBAR -->
    <nav class="bg-black border-b border-[#facc15]/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3 group">
                <img src="logo.png" alt="DOG Logo" class="h-12 w-auto transition-all duration-300 group-hover:scale-110">
                <span class="text-3xl logo-font tracking-tight logo-yellow">DOG</span>
            </div>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="#mission" class="hover:logo-yellow transition">Mission</a>
                <a href="#shop" class="hover:logo-yellow transition">Shop</a>
                <a href="#donate" class="hover:logo-yellow transition">Donate</a>
                <a href="#impact" class="hover:logo-yellow transition">Impact</a>
            </div>
            <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-2xl border border-[#facc15]/30">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count" class="text-sm">0</span>
            </button>
        </div>
    </nav>

    <!-- HERO, MISSION, SHOP sections are the same as your last working version. For brevity, I'm showing only the changed modal part. Keep the rest from your previous code or use the full one I gave earlier. -->

    <!-- QUICK VIEW MODAL - HORIZONTAL LAYOUT -->
    <div id="quickModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-4xl w-full overflow-hidden">
            <div class="flex flex-col md:flex-row">
                <!-- Left side: Image + Thumbnails -->
                <div class="md:w-1/2 p-8 flex flex-col items-center">
                    <button onclick="closeModal()" class="self-end text-4xl text-gray-400 hover:text-white mb-4">×</button>
                    
                    <div class="modal-image-container w-full mb-6">
                        <img id="modalImage" src="" alt="" class="w-full h-[420px] object-contain mx-auto">
                    </div>

                    <div id="thumbnailContainer" class="flex gap-4 justify-center"></div>
                </div>

                <!-- Right side: Details, Size, Quantity, Add to Cart -->
                <div class="md:w-1/2 p-8 flex flex-col">
                    <h3 id="modalTitle" class="text-3xl font-semibold mb-2"></h3>
                    <div id="modalPrice" class="text-5xl font-bold logo-yellow mb-8"></div>

                    <!-- SIZE -->
                    <div class="mb-6">
                        <p class="text-sm text-gray-400 mb-3">SIZE</p>
                        <div class="flex gap-3 flex-wrap">
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3 border border-gray-700 rounded-2xl hover:logo-yellow-border transition">S</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3 border border-gray-700 rounded-2xl hover:logo-yellow-border transition">M</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3 border border-gray-700 rounded-2xl hover:logo-yellow-border transition">L</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3 border border-gray-700 rounded-2xl hover:logo-yellow-border transition">XL</button>
                            <button onclick="selectSize(this)" class="size-btn px-7 py-3 border border-gray-700 rounded-2xl hover:logo-yellow-border transition">XXL</button>
                        </div>
                    </div>

                    <!-- QUANTITY -->
                    <div class="mb-8">
                        <p class="text-sm text-gray-400 mb-2">QUANTITY</p>
                        <div class="flex items-center gap-6">
                            <button onclick="changeQty(-1)" class="w-12 h-12 border border-gray-700 rounded-2xl text-3xl hover:border-[#facc15]">-</button>
                            <span id="modalQty" class="text-4xl font-medium w-12 text-center">1</span>
                            <button onclick="changeQty(1)" class="w-12 h-12 border border-gray-700 rounded-2xl text-3xl hover:border-[#facc15]">+</button>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <div class="flex justify-between items-baseline mb-6">
                            <span class="text-sm text-gray-400">TOTAL</span>
                            <div id="modalTotalPrice" class="text-5xl font-bold logo-yellow"></div>
                        </div>
                        <button onclick="addCurrentToCart()" class="w-full logo-yellow-bg hover:bg-[#fde047] text-black py-5 rounded-3xl font-semibold text-lg">ADD TO CART</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cartCount = 0;
        let currentProduct = null;
        let currentQty = 1;
        let currentImageIndex = 0;

        const products = [
            { id: 0, name: "DOG Classic Tee", price: 29, images: ["classic-tee-1.jpg", "classic-tee-2.jpg"] },
            { id: 1, name: "DOG Long Sleeve", price: 39, images: ["long-sleeve-1.jpg", "long-sleeve-2.jpg"] },
            { id: 2, name: "DOG Hoodie", price: 59, images: ["hoodie-1.jpg", "hoodie-2.jpg"] }
        ];

        function quickView(index) {
            currentProduct = products[index];
            currentQty = 1;
            currentImageIndex = 0;
            updateModalImage();
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalPrice').textContent = '$' + currentProduct.price;
            updateModalTotal();
            renderThumbnails();
            document.getElementById('quickModal').classList.remove('hidden');
            document.getElementById('quickModal').classList.add('flex');
        }

        function updateModalImage() {
            document.getElementById('modalImage').src = currentProduct.images[currentImageIndex];
        }

        function renderThumbnails() {
            const container = document.getElementById('thumbnailContainer');
            container.innerHTML = '';
            currentProduct.images.forEach((imgSrc, i) => {
                const thumb = document.createElement('img');
                thumb.src = imgSrc;
                thumb.className = `w-20 h-20 object-contain bg-zinc-950 rounded-xl cursor-pointer border-2 transition ${i === currentImageIndex ? 'border-[#facc15] scale-110' : 'border-transparent'}`;
                thumb.onclick = () => {
                    currentImageIndex = i;
                    updateModalImage();
                    renderThumbnails();
                };
                container.appendChild(thumb);
            });
        }

        function closeModal() {
            const modal = document.getElementById('quickModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function selectSize(btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('logo-yellow-border', 'text-[#facc15]'));
            btn.classList.add('logo-yellow-border', 'text-[#facc15]');
        }

        function changeQty(delta) {
            currentQty = Math.max(1, currentQty + delta);
            document.getElementById('modalQty').textContent = currentQty;
            updateModalTotal();
        }

        function updateModalTotal() {
            if (!currentProduct) return;
            document.getElementById('modalTotalPrice').textContent = '$' + (currentProduct.price * currentQty);
        }

        function addCurrentToCart() {
            if (!currentProduct) return;
            addToCart(currentProduct.id, currentProduct.price * currentQty, currentProduct.name);
            closeModal();
            alert(`${currentQty} × ${currentProduct.name} added to cart!`);
        }

        function addToCart(index, price, name) {
            cartCount++;
            document.getElementById('cart-count').textContent = cartCount;
        }

        function toggleCart() {
            alert("Cart coming soon — currently " + cartCount + " items");
        }

        document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });
    </script>
</body>
</html>
