<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG | Dads of God</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.92)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat; 
        }
        
        .logo-yellow { color: #facc15; }
        .logo-yellow-bg { background-color: #facc15; }
        .logo-yellow-border { border-color: #facc15; }
        
        .product-image-container {
            background-color: #111827;
            padding: 20px;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image {
            max-height: 310px;
            width: auto;
            object-fit: contain;
        }
        
        .modal-image-container {
            background-color: #111827;
            padding: 20px;
            border-radius: 16px;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- NAVBAR (same) -->
    <nav class="bg-black border-b border-[#facc15]/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3 group">
                <img src="logo.png" alt="DOG Logo" class="h-12 w-auto transition-all duration-300 group-hover:scale-110 group-hover:brightness-110">
                <span class="text-3xl logo-font tracking-tight logo-yellow">DOG</span>
            </div>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="#mission" class="hover:logo-yellow transition">Mission</a>
                <a href="#shop" class="hover:logo-yellow transition">Shop</a>
                <a href="#donate" class="hover:logo-yellow transition">Donate</a>
                <a href="#impact" class="hover:logo-yellow transition">Impact</a>
            </div>
            <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-2xl border border-[#facc15]/30">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count" class="text-sm">0</span>
            </button>
        </div>
    </nav>

    <!-- HERO, MISSION, SHOP, DONATE, IMPACT sections are the same as your previous working version. For brevity, I'm showing only the key changed parts below. Keep the rest from your last good code if you want, but the full replacement is recommended. -->

    <!-- SHOP SECTION (same as before) -->
    <section id="shop" class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-5xl font-semibold text-center mb-4 logo-font logo-yellow">Gear for the Working Man</h2>
        <p class="text-center text-xl text-gray-400 mb-12">Premium shirts for the dads who clock in, provide, and stand on faith.</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-[#facc15]/20">
                <div class="product-image-container">
                    <img src="classic-tee-1.jpg" alt="DOG Classic Tee" class="product-image cursor-pointer" onclick="quickView(0)">
                </div>
                <div class="p-6">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-2xl font-semibold">DOG Classic Tee</h3>
                        <span class="text-2xl font-bold logo-yellow">$29</span>
                    </div>
                    <button onclick="addToCart(0, 29, 'DOG Classic Tee')" class="mt-6 w-full logo-yellow-bg hover:bg-[#fde047] text-black py-4 rounded-2xl font-semibold">ADD TO CART — $29</button>
                    <button onclick="buyNow(29, 'DOG Classic Tee')" class="mt-3 w-full border border-[#facc15] hover:bg-white/10 py-4 rounded-2xl font-semibold">BUY NOW WITH PAYPAL</button>
                </div>
            </div>

            <!-- Repeat for Long Sleeve and Hoodie with their images and onclick="quickView(1)" / quickView(2) -->

        </div>
    </section>

    <!-- QUICK VIEW MODAL - Tighter framing -->
    <div id="quickModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-md w-full overflow-hidden">
            <div class="p-5">
                <button onclick="closeModal()" class="float-right text-4xl text-gray-400 hover:text-white">×</button>
                
                <div class="modal-image-container mb-6">
                    <img id="modalImage" src="" alt="" class="w-full h-[360px] object-contain mx-auto">
                </div>

                <div id="thumbnailContainer" class="flex gap-3 justify-center mb-6"></div>

                <h3 id="modalTitle" class="text-2xl font-semibold mb-1"></h3>
                <div id="modalPrice" class="text-3xl font-bold logo-yellow mb-6"></div>

                <div class="mb-6">
                    <p class="text-sm text-gray-400 mb-2">SIZE</p>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="selectSize(this)" class="size-btn px-5 py-2.5 border border-gray-700 rounded-2xl text-sm hover:logo-yellow-border transition">S</button>
                        <button onclick="selectSize(this)" class="size-btn px-5 py-2.5 border border-gray-700 rounded-2xl text-sm hover:logo-yellow-border transition">M</button>
                        <button onclick="selectSize(this)" class="size-btn px-5 py-2.5 border border-gray-700 rounded-2xl text-sm hover:logo-yellow-border transition">L</button>
                        <button onclick="selectSize(this)" class="size-btn px-5 py-2.5 border border-gray-700 rounded-2xl text-sm hover:logo-yellow-border transition">XL</button>
                        <button onclick="selectSize(this)" class="size-btn px-5 py-2.5 border border-gray-700 rounded-2xl text-sm hover:logo-yellow-border transition">XXL</button>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-xs text-gray-400">QTY</p>
                        <div class="flex items-center gap-3 mt-1">
                            <button onclick="changeQty(-1)" class="w-8 h-8 border border-gray-700 rounded-xl text-lg">-</button>
                            <span id="modalQty" class="text-2xl font-medium w-8 text-center">1</span>
                            <button onclick="changeQty(1)" class="w-8 h-8 border border-gray-700 rounded-xl text-lg">+</button>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400">TOTAL</p>
                        <div id="modalTotalPrice" class="text-3xl font-bold logo-yellow"></div>
                    </div>
                </div>
                
                <button onclick="addCurrentToCart()" class="w-full logo-yellow-bg hover:bg-[#fde047] text-black py-4 rounded-3xl font-semibold">ADD TO CART</button>
            </div>
        </div>
    </div>

    <script>
        let totalImpact = 0;
        let cartCount = 0;
        let currentProduct = null;
        let currentQty = 1;
        let currentImageIndex = 0;

        const products = [
            { id: 0, name: "DOG Classic Tee", price: 29, images: ["classic-tee-1.jpg", "classic-tee-2.jpg"] },
            { id: 1, name: "DOG Long Sleeve", price: 39, images: ["long-sleeve-1.jpg", "long-sleeve-2.jpg"] },
            { id: 2, name: "DOG Hoodie", price: 59, images: ["hoodie-1.jpg", "hoodie-2.jpg"] }
        ];

        function quickView(index) {
            currentProduct = products[index];
            currentQty = 1;
            currentImageIndex = 0;
            updateModalImage();
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalPrice').textContent = '$' + currentProduct.price;
            updateModalTotal();
            renderThumbnails();
            document.getElementById('quickModal').classList.remove('hidden');
            document.getElementById('quickModal').classList.add('flex');
        }

        function updateModalImage() {
            document.getElementById('modalImage').src = currentProduct.images[currentImageIndex];
        }

        function renderThumbnails() {
            const container = document.getElementById('thumbnailContainer');
            container.innerHTML = '';
            currentProduct.images.forEach((imgSrc, i) => {
                const thumb = document.createElement('img');
                thumb.src = imgSrc;
                thumb.className = `w-20 h-20 object-contain bg-zinc-950 rounded-xl cursor-pointer border-2 transition ${i === currentImageIndex ? 'border-[#facc15] scale-110' : 'border-transparent'}`;
                thumb.onclick = () => {
                    currentImageIndex = i;
                    updateModalImage();
                    renderThumbnails();
                };
                container.appendChild(thumb);
            });
        }

        function closeModal() {
            const modal = document.getElementById('quickModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function selectSize(btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('logo-yellow-border', 'text-[#facc15]'));
            btn.classList.add('logo-yellow-border', 'text-[#facc15]');
        }

        function changeQty(delta) {
            currentQty = Math.max(1, currentQty + delta);
            document.getElementById('modalQty').textContent = currentQty;
            updateModalTotal();
        }

        function updateModalTotal() {
            if (!currentProduct) return;
            document.getElementById('modalTotalPrice').textContent = '$' + (currentProduct.price * currentQty);
        }

        function addCurrentToCart() {
            if (!currentProduct) return;
            addToCart(currentProduct.id, currentProduct.price * currentQty, currentProduct.name);
            closeModal();
        }

        function addToCart(index, price, name) {
            cartCount++;
            document.getElementById('cart-count').textContent = cartCount;
            updateImpact(price * 0.25);
        }

        function buyNow(price, name) {
            alert(`Opening PayPal checkout for ${name} - $${price}`);
            updateImpact(price * 0.25);
            window.open("https://www.paypal.com", "_blank");
        }

        function updateImpact(amount) {
            totalImpact += amount;
            document.getElementById('impact-total').textContent = '$' + Math.round(totalImpact).toLocaleString();
        }

        function activateLogo() {
            updateImpact(10);
            alert("Faith Activated! +$10 to the mission");
        }

        function toggleCart() {
            alert("Cart coming soon — currently " + cartCount + " items");
        }

        document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });
    </script>
</body>
</html>
