<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG | Dads of God</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: black; color: white; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .logo-yellow { color: #facc15; }
        .logo-yellow-bg { background-color: #facc15; }
        
        .product-image-container {
            background: #111827;
            padding: 15px;
            min-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image { max-height: 300px; object-fit: contain; }
        
        .modal-image-container {
            background: #111827;
            padding: 15px;
            border-radius: 16px;
        }
        #modalImage { max-height: 340px; object-fit: contain; width: 100%; }
    </style>
</head>
<body>

    <nav class="bg-black border-b border-[#facc15]/30 sticky top-0 z-50 p-5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="DOG" class="h-12">
                <span class="text-3xl logo-font logo-yellow">DOG</span>
            </div>
        </div>
    </nav>

    <section id="shop" class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-5xl font-semibold text-center mb-4 logo-font logo-yellow">Gear for the Working Man</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Classic Tee -->
            <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                <div class="product-image-container">
                    <img src="classic-tee-1.jpg" onclick="quickView(0)" class="product-image cursor-pointer">
                </div>
                <div class="p-6">
                    <h3 class="text-2xl">DOG Classic Tee</h3>
                    <p class="text-3xl logo-yellow">$29</p>
                </div>
            </div>

            <!-- Long Sleeve -->
            <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                <div class="product-image-container">
                    <img src="long-sleeve-1.jpg" onclick="quickView(1)" class="product-image cursor-pointer">
                </div>
                <div class="p-6">
                    <h3 class="text-2xl">DOG Long Sleeve</h3>
                    <p class="text-3xl logo-yellow">$39</p>
                </div>
            </div>

            <!-- Hoodie -->
            <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                <div class="product-image-container">
                    <img src="hoodie-1.jpg" onclick="quickView(2)" class="product-image cursor-pointer">
                </div>
                <div class="p-6">
                    <h3 class="text-2xl">DOG Hoodie</h3>
                    <p class="text-3xl logo-yellow">$59</p>
                </div>
            </div>
        </div>
    </section>

    <!-- QUICK VIEW MODAL - Tight framing -->
    <div id="quickModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-md w-full p-5">
            <button onclick="closeModal()" class="float-right text-4xl text-gray-400 hover:text-white">×</button>
            
            <div class="modal-image-container mb-6">
                <img id="modalImage" src="" class="mx-auto">
            </div>

            <div id="thumbnailContainer" class="flex gap-3 justify-center mb-6"></div>

            <h3 id="modalTitle" class="text-2xl font-semibold"></h3>
            <div id="modalPrice" class="text-3xl logo-yellow"></div>

            <button onclick="closeModal()" class="mt-8 w-full logo-yellow-bg text-black py-4 rounded-3xl font-semibold">Close</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 0, name: "DOG Classic Tee", price: 29, images: ["classic-tee-1.jpg", "classic-tee-2.jpg"] },
            { id: 1, name: "DOG Long Sleeve", price: 39, images: ["long-sleeve-1.jpg", "long-sleeve-2.jpg"] },
            { id: 2, name: "DOG Hoodie", price: 59, images: ["hoodie-1.jpg", "hoodie-2.jpg"] }
        ];

        function quickView(index) {
            const p = products[index];
            document.getElementById('modalTitle').textContent = p.name;
            document.getElementById('modalPrice').textContent = '$' + p.price;
            document.getElementById('modalImage').src = p.images[0];
            
            const container = document.getElementById('thumbnailContainer');
            container.innerHTML = '';
            p.images.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = `w-20 h-20 object-contain cursor-pointer border-2 rounded-xl ${i === 0 ? 'border-[#facc15]' : 'border-transparent'}`;
                img.onclick = () => {
                    document.getElementById('modalImage').src = src;
                };
                container.appendChild(img);
            });
            
            document.getElementById('quickModal').classList.remove('hidden');
            document.getElementById('quickModal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('quickModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>
